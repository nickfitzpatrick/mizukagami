name: eval

# Runs unit tests and the retrieval eval (keyword + embeddings) on every
# push/PR. Installs the same deps you run locally (requirements-dev.txt) so CI
# tests exactly what ships. Stays hermetic: no chat-model API calls / no Ollama
# (the chat test injects a fake model); the embedding model runs locally
# in-process via sentence-transformers (downloaded once from HuggingFace).

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps (same as local dev)
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt

      # Cache the embedding model so CI downloads it once, not every run.
      # Avoids HuggingFace 429 rate-limits on repeated anonymous pulls.
      - name: Cache HuggingFace model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-all-MiniLM-L6-v2

      # Pre-fetch the model with retries so a transient 429 on a cold cache
      # doesn't fail the run. No-op once the cache is warm.
      - name: Pre-download embedding model
        run: |
          for i in 1 2 3 4 5; do
            python -c "from sentence_transformers import SentenceTransformer; SentenceTransformer('all-MiniLM-L6-v2')" && break
            echo "Download failed (attempt $i), retrying in $((i*15))s..."
            sleep $((i*15))
          done

      - name: Run unit tests
        run: |
          cd backend && python -m pytest -q

      - name: Run retrieval eval (keyword + embeddings)
        run: |
          cd eval && python run_eval.py --k 1
