name: eval

# Runs unit tests and the keyword-stage retrieval eval on every push/PR.
# Installs the same deps you run locally (requirements-dev.txt) so CI tests
# exactly what ships. No model API calls / no Ollama happen — the chat test
# injects a fake model — so it stays effectively hermetic.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps (same as local dev)
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements-dev.txt

      - name: Run unit tests
        run: |
          cd backend && python -m pytest -q

      - name: Run keyword-stage retrieval eval
        run: |
          cd eval && python run_eval.py
