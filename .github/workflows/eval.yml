name: eval

# Runs unit tests and the keyword-stage retrieval eval on every push/PR.
# Hermetic: no model API calls, no Ollama. Keyword retrieval + logic only.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps (retrieval/eval only — hermetic, no model libs needed)
        run: |
          python -m pip install --upgrade pip
          pip install python-frontmatter pytest
          # Note: full app deps are in backend/requirements.txt; CI only needs
          # frontmatter (for notes_store) + pytest since it runs keyword-stage
          # retrieval + unit tests, no model calls.

      - name: Run unit tests
        run: |
          cd backend && python -m pytest -q

      - name: Run keyword-stage retrieval eval
        run: |
          cd eval && python run_eval.py
