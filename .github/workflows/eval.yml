name: eval

# Runs unit tests and the keyword-stage retrieval eval on every push/PR.
# Hermetic: no model API calls, no Ollama. Keyword retrieval + logic only.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps (hermetic — no model libs/calls)
        run: |
          python -m pip install --upgrade pip
          pip install python-frontmatter pytest fastapi httpx
          # CI runs keyword-stage retrieval + unit/API tests, no model calls.
          # fastapi+httpx are needed for the /chat and /notes API tests
          # (the chat test injects a fake model). Full app deps live in
          # backend/requirements.txt.

      - name: Run unit tests
        run: |
          cd backend && python -m pytest -q

      - name: Run keyword-stage retrieval eval
        run: |
          cd eval && python run_eval.py
