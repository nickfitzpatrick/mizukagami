name: eval

# Runs unit tests and the keyword-stage retrieval eval on every push/PR.
# Hermetic: no model API calls, no Ollama. Keyword retrieval + logic only.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend deps
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run unit tests
        run: |
          # pytest -q   # enable once tests exist (M1+)
          echo "no tests yet — enable pytest at M1"

      - name: Run keyword-stage retrieval eval
        run: |
          cd eval && python run_eval.py
